server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # --- Security-Header (gelten für alle Antworten dieses Servers) ---
  # add_header wird von location-Blöcken geerbt, solange diese keine eigenen
  # add_header setzen (hier nicht der Fall). "always" -> auch auf Fehlerseiten.
  #
  # CSP: Die SPA lädt JS/CSS nur vom eigenen Origin und spricht per axios nur
  # same-origin. 'unsafe-inline' ist bei style-src nötig, weil Vue Scoped-Styles
  # teils als Inline-style-Attribute rendert; Inline-JS gibt es keines.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
  add_header X-Frame-Options "DENY" always;                 # Clickjacking (Backup zu frame-ancestors)
  add_header X-Content-Type-Options "nosniff" always;       # kein MIME-Sniffing
  add_header Referrer-Policy "no-referrer" always;          # keine Referrer-Leaks an Kanidm
  # HSTS nur aktivieren, wenn vor nginx TLS terminiert wird (sonst sperrt es HTTP aus):
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # --- API + OIDC -> Backend (Reverse-Proxy, gleicher Origin für den Browser) ---
  # Dadurch funktioniert das HttpOnly-Session-Cookie ohne CORS-Sonderfälle.
  # Der Hostname "backend" wird beim nginx-Start über den System-Resolver
  # (/etc/resolv.conf) aufgelöst – funktioniert unter Docker und Podman. Daher
  # muss der Backend-Container vor dem Frontend laufen (so macht es das
  # Compose-depends_on bzw. podman-up.sh).
  location ~ ^/(auth|user|spin|loan|admin|health)(/|$) {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA-Fallback: alle übrigen Routen an index.html, damit vue-router
  # (history mode) funktioniert.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
