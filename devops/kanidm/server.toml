# Kanidm server configuration (mounted at /data/server.toml).
# Docs: https://kanidm.github.io/kanidm/stable/server_configuration.html
version = "2"

# Listen on all interfaces inside the container on the HTTPS port.
bindaddress = "[::]:8443"

# Persisted under the kanidm_data volume.
db_path = "/data/kanidm.db"

# Self-signed certificate generated by the bootstrap step (kanidmd cert-generate).
tls_chain = "/data/chain.pem"
tls_key = "/data/key.pem"

# IMPORTANT: domain/origin must match the hostname the BROWSER uses. We use
# "localhost" so no /etc/hosts entry is needed. The backend reaches Kanidm
# internally as "kanidm" over the compose network; the TLS cert (gen-cert.sh)
# carries BOTH names as SANs so both paths verify.
domain = "localhost"
origin = "https://localhost:8443"

role = "WriteReplica"
