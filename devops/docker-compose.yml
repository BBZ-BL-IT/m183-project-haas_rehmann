# =====================================================================
#  Full stack: PostgreSQL + Kanidm + backend + frontend.
#
#     cp .env.example .env       # then edit DOCKER_USERNAME + PRIVATE_COOKIE_KEY
#     echo "127.0.0.1 kanidm" | sudo tee -a /etc/hosts   # one-time
#     docker compose up -d
#
#  Open:  http://localhost:8081   (frontend; proxies /auth + API to backend)
#  Login: see ./kanidm/secrets/reset-links.txt to set the demo passwords first.
#
#  Startup order is enforced via depends_on:
#     postgres (healthy) ─┐
#     kanidm-bootstrap ─> kanidm ─> kanidm-provision (writes client secret) ─┐
#                                                                            ├─> backend ─> frontend
# =====================================================================

name: casino

networks:
  casino_net:
    name: casino_net

volumes:
  pg_data:
  kanidm_data:

services:
  # ---------------------------------------------------------------- Postgres --
  postgres:
    image: postgres:17-alpine
    container_name: casino-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-m183_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - casino_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-m183_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------ Kanidm --
  # The kanidm images are distroless (no shell). Stage a static busybox so the
  # bootstrap/provision shell scripts can run inside them.
  busybox-init:
    image: busybox:musl
    container_name: casino-busybox-init
    command:
      - sh
      - -c
      - |
        cp /bin/busybox /shared/busybox && chmod 755 /shared/busybox &&
        mkdir -p /shared/bin &&
        for a in sh sed grep head cat tr tee cut cp chmod mkdir rm sleep seq printf env test wc; do
          ln -sf /shared/busybox /shared/bin/$$a;
        done &&
        echo "busybox staged"
    volumes:
      - ./kanidm/secrets:/shared
    networks:
      - casino_net

  # Generate the multi-SAN TLS cert (localhost + kanidm) using openssl.
  kanidm-cert:
    image: docker.io/alpine/openssl:latest
    container_name: casino-kanidm-cert
    entrypoint: ["/bin/sh", "/gen-cert.sh"]
    volumes:
      - kanidm_data:/data
      - ./kanidm/gen-cert.sh:/gen-cert.sh:ro
      - ./kanidm/secrets:/shared
    networks:
      - casino_net

  kanidm:
    image: kanidm/server:latest
    container_name: casino-kanidm
    restart: unless-stopped
    command: ["/sbin/kanidmd", "server", "-c", "/data/server.toml"]
    depends_on:
      kanidm-cert:
        condition: service_completed_successfully
    ports:
      - "8443:8443"
    volumes:
      - kanidm_data:/data
      - ./kanidm/server.toml:/data/server.toml:ro
      - ./kanidm/secrets:/shared
    networks:
      - casino_net

  kanidm-recover:
    image: kanidm/server:latest
    container_name: casino-kanidm-recover
    entrypoint: ["/shared/busybox", "sh", "/recover.sh"]
    depends_on:
      kanidm:
        condition: service_started
    volumes:
      - kanidm_data:/data
      - ./kanidm/server.toml:/data/server.toml:ro
      - ./kanidm/recover.sh:/recover.sh:ro
      - ./kanidm/secrets:/shared
    networks:
      - casino_net

  kanidm-provision:
    image: kanidm/tools:latest
    container_name: casino-kanidm-provision
    entrypoint: ["/shared/busybox", "sh", "/provision.sh"]
    environment:
      KANIDM_URL: ${KANIDM_ORIGIN:-https://kanidm:8443}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-m183-backend}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8081/auth/callback}
      KANIDM_ADMIN_ACCOUNT: ${KANIDM_ADMIN_ACCOUNT:-rehmann_admin}
      KANIDM_USER_ACCOUNT: ${KANIDM_USER_ACCOUNT:-rehmann_user}
    depends_on:
      kanidm-recover:
        condition: service_completed_successfully
    volumes:
      - ./kanidm/provision.sh:/provision.sh:ro
      - ./kanidm/secrets:/shared
    networks:
      - casino_net

  # One-shot: set ready-to-use passwords for the demo accounts -> writes
  # kanidm/secrets/demo-credentials.txt.
  kanidm-demo-passwords:
    image: kanidm/server:latest
    container_name: casino-kanidm-demo-passwords
    entrypoint: ["/shared/busybox", "sh", "/demo-passwords.sh"]
    environment:
      KANIDM_ADMIN_ACCOUNT: ${KANIDM_ADMIN_ACCOUNT:-rehmann_admin}
      KANIDM_USER_ACCOUNT: ${KANIDM_USER_ACCOUNT:-rehmann_user}
    depends_on:
      kanidm-provision:
        condition: service_completed_successfully
    volumes:
      - kanidm_data:/data
      - ./kanidm/server.toml:/data/server.toml:ro
      - ./kanidm/demo-passwords.sh:/demo-passwords.sh:ro
      - ./kanidm/secrets:/shared
    networks:
      - casino_net

  # ----------------------------------------------------------------- Backend --
  backend:
    image: ${BACKEND_IMAGE:-changeme/grand-casino-backend:latest}
    container_name: casino-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kanidm-provision:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      RUST_LOG: ${RUST_LOG:-info}

      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-m183_db}

      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-m183-backend}
      OIDC_CLIENT_SECRET_FILE: /shared/oauth2_client_secret
      # Browser-facing (the redirect the user's browser follows) -> localhost.
      OIDC_AUTH_ENDPOINT: ${KANIDM_PUBLIC_ORIGIN:-https://localhost:8443}/ui/oauth2
      # Server-side (backend -> Kanidm over the compose network) -> kanidm.
      OIDC_TOKEN_ENDPOINT: ${KANIDM_ORIGIN:-https://kanidm:8443}/oauth2/token
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8081/auth/callback}
      OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDC_POST_LOGOUT_REDIRECT_URI:-http://localhost:8081/}
      OIDC_CA_CERT: /shared/kanidm-ca.pem
      OIDC_ROLE_CLAIMS: roles,groups,scopes,scope
      OIDC_ADMIN_ROLE: admin

      # Self-registration: backend creates Kanidm persons via the registrar token.
      KANIDM_API_URL: ${KANIDM_ORIGIN:-https://kanidm:8443}
      KANIDM_PUBLIC_ORIGIN: ${KANIDM_PUBLIC_ORIGIN:-https://localhost:8443}
      KANIDM_REGISTRAR_TOKEN_FILE: /shared/registrar_token
      KANIDM_REGISTER_GROUP: casino_users

      PRIVATE_COOKIE_KEY: ${PRIVATE_COOKIE_KEY:?set PRIVATE_COOKIE_KEY in .env}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-1440}
    volumes:
      - ./kanidm/secrets:/shared:ro
    networks:
      - casino_net

  # ---------------------------------------------------------------- Frontend --
  frontend:
    image: ${FRONTEND_IMAGE:-changeme/grand-casino-frontend:latest}
    container_name: casino-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"
    networks:
      - casino_net
